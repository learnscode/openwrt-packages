name: Clean up old workflow runs

on:
  schedule:
    # 每天凌晨 2 点运行一次，可根据需要调整
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      keep_runs:
        description: 'Number of latest runs to keep per workflow (except this workflow itself)'
        required: true
        default: 3
        type: number
      keep_self_runs:
        description: 'Number of latest runs to keep for this cleanup workflow itself'
        required: true
        default: 1
        type: number

permissions:
  actions: write   # 允许删除工作流运行
  contents: read   # 允许列出工作流

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete old workflow runs
        uses: actions/github-script@v7
        with:
          script: |
            // 获取用户输入的保留数量
            const keepRunsDefault = parseInt('${{ github.event.inputs.keep_runs || 3 }}');
            const keepSelfRuns = parseInt('${{ github.event.inputs.keep_self_runs || 1 }}');

            // 获取当前工作流的 ID（用于识别自身）
            const currentRun = await github.rest.actions.getWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
            });
            const currentWorkflowId = currentRun.data.workflow_id;

            console.log(`Keeping latest ${keepRunsDefault} runs for other workflows.`);
            console.log(`Keeping latest ${keepSelfRuns} runs for this cleanup workflow (ID: ${currentWorkflowId}).`);

            // 获取仓库中所有工作流
            const { data: workflows } = await github.rest.actions.listRepoWorkflows({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            for (const workflow of workflows.workflows) {
              console.log(`\nProcessing workflow: ${workflow.name} (${workflow.path})`);

              // 判断是否为当前工作流，确定保留数量
              const keepRuns = (workflow.id === currentWorkflowId) ? keepSelfRuns : keepRunsDefault;
              console.log(`Retention setting: keep latest ${keepRuns} runs.`);

              let allRuns = [];
              try {
                allRuns = await github.paginate(github.rest.actions.listWorkflowRuns, {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  workflow_id: workflow.id,
                  per_page: 100,
                });
              } catch (error) {
                console.error(`Failed to list runs for workflow ${workflow.name}: ${error.message}`);
                continue;
              }

              // 按创建时间降序排序
              const sortedRuns = allRuns.sort((a, b) => 
                new Date(b.created_at) - new Date(a.created_at)
              );

              console.log(`Total runs found: ${sortedRuns.length}`);
              if (sortedRuns.length <= keepRuns) {
                console.log(`No runs to delete (<= ${keepRuns}).`);
                continue;
              }

              const runsToDelete = sortedRuns.slice(keepRuns);
              console.log(`Runs to delete: ${runsToDelete.length}`);

              for (const run of runsToDelete) {
                // 只删除已完成的工作流运行
                if (run.status !== 'completed') {
                  console.log(`Skipping incomplete run #${run.run_number} (${run.status})`);
                  continue;
                }

                try {
                  await github.rest.actions.deleteWorkflowRun({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    run_id: run.id,
                  });
                  console.log(`Deleted run #${run.run_number} (created at ${run.created_at})`);
                  await new Promise(resolve => setTimeout(resolve, 300));
                } catch (error) {
                  console.error(`Failed to delete run #${run.run_number}: ${error.message}`);
                }
              }
            }

            console.log('\nCleanup completed.');
